<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Customers — FineInvoice</title>
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://fineinvoice.com/customers.html">
<link rel="icon" type="image/jpeg" href="https://fineinvoice.com/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css">
<style>
.add-customer-card { margin-bottom: 24px; }
.add-customer-card .card-head {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  font-weight: 700; font-size: 15px;
  display: flex; align-items: center; gap: 8px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px 24px; }
.form-grid .full { grid-column: 1 / -1; }
.action-btns { display: flex; gap: 6px; }
.avatar-cell {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: white; flex-shrink: 0;
}
.customer-row td { vertical-align: middle; }
.search-bar { display: flex; gap: 12px; margin-bottom: 20px; }
.search-wrap { position: relative; flex: 1; }
.search-wrap .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); pointer-events: none; }
.search-wrap input { padding-left: 40px; }
.empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
.empty-state .icon { font-size: 56px; margin-bottom: 16px; }
.edit-mode .card-head { background: var(--violet-l); color: var(--violet); }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
  <div class="sb-logo">
    <img src="logo.jpg" alt="FineInvoice">
    <span>FineInvoice</span>
  </div>
  <nav class="sb-nav">
    <a href="dashboard.html"><span class="ni">🏠</span>Dashboard</a>
    <a href="app.html"><span class="ni">✏️</span>New Invoice</a>
    <a href="invoices.html"><span class="ni">📋</span>Invoices</a>
    <a href="customers.html" class="active"><span class="ni">👥</span>Customers</a>
    <a href="payment.html"><span class="ni">💳</span>Billing</a>
  </nav>
  <div class="sb-footer">
    <a href="#" onclick="logout()"><span>🚪</span>Sign Out</a>
  </div>
</aside>

  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">👥 Customers</span>
      <div class="topbar-right" id="userChip"></div>
    </div>

    <div class="page-body">

      <!-- Add / Edit Form -->
      <div class="card add-customer-card" id="formCard">
        <div class="card-head" id="formTitle">➕ Add Customer</div>
        <div class="form-grid">
          <div>
            <label class="form-label">Full Name *</label>
            <input class="form-input" id="cName" placeholder="e.g. Ali Hassan">
          </div>
          <div>
            <label class="form-label">Company</label>
            <input class="form-input" id="cCompany" placeholder="Company name">
          </div>
          <div>
            <label class="form-label">Email</label>
            <input class="form-input" id="cEmail" type="email" placeholder="email@example.com">
          </div>
          <div>
            <label class="form-label">Phone</label>
            <input class="form-input" id="cPhone" placeholder="+92 300 0000000">
          </div>
          <div class="full">
            <label class="form-label">Address</label>
            <input class="form-input" id="cAddress" placeholder="Street, City, Country">
          </div>
          <div class="full" style="display:flex;gap:10px">
            <button class="btn btn-primary" onclick="saveCustomer()">💾 Save Customer</button>
            <button class="btn btn-ghost" id="cancelBtn" onclick="cancelEdit()" style="display:none">Cancel</button>
          </div>
        </div>
      </div>

      <div class="section-head mb-4">
        <div>
          <div class="section-title" style="font-size:18px">Customer List</div>
          <div class="text-muted text-sm mt-1" id="custCountLabel">0 customers</div>
        </div>
      </div>

      <div class="search-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="form-input" id="search" placeholder="Search customers…" oninput="renderCustomers()">
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th></th>
                <th>Name</th>
                <th>Company</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="customerTable"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty-state" style="display:none">
          <div class="icon">👤</div>
          <h3>No customers yet</h3>
          <p>Add your first customer using the form above.</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/utils.js"></script>
<script>
requireAuth();
renderUserChip('userChip');
setActiveNav();

let editId = null;
const colors = ['#6C3FF5','#FF5C5C','#00C48C','#3AB3FF','#FFB547','#EC4899'];
function getColor(str){ let h=0; for(let c of (str||'')) h=(h<<5)-h+c.charCodeAt(0); return colors[Math.abs(h)%colors.length]; }

function saveCustomer(){
  const name = document.getElementById('cName').value.trim();
  if(!name){ showToast('Name is required', 'error'); return; }

  const customers = getCustomers();
  const customer = {
    id:      editId || Date.now(),
    name,
    company: document.getElementById('cCompany').value.trim(),
    email:   document.getElementById('cEmail').value.trim(),
    phone:   document.getElementById('cPhone').value.trim(),
    address: document.getElementById('cAddress').value.trim(),
    createdAt: editId ? undefined : new Date().toISOString()
  };

  if(editId){
    const idx = customers.findIndex(c => c.id === editId);
    if(idx > -1) customers[idx] = customer;
  } else {
    customers.push(customer);
  }

  saveCustomers(customers);
  cancelEdit();
  showToast(editId ? 'Customer updated ✅' : 'Customer added ✅', 'success');
  renderCustomers();
}

function editCustomer(id){
  const c = getCustomers().find(c => c.id === id);
  if(!c) return;
  editId = id;
  document.getElementById('cName').value    = c.name;
  document.getElementById('cCompany').value = c.company;
  document.getElementById('cEmail').value   = c.email;
  document.getElementById('cPhone').value   = c.phone;
  document.getElementById('cAddress').value = c.address;
  document.getElementById('formTitle').textContent = '✏️ Edit Customer';
  document.getElementById('formCard').classList.add('edit-mode');
  document.getElementById('cancelBtn').style.display = 'inline-flex';
  document.getElementById('cName').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit(){
  editId = null;
  ['cName','cCompany','cEmail','cPhone','cAddress'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('formTitle').textContent = '➕ Add Customer';
  document.getElementById('formCard').classList.remove('edit-mode');
  document.getElementById('cancelBtn').style.display = 'none';
}

function deleteCustomer(id){
  if(!confirm('Delete this customer?')) return;
  saveCustomers(getCustomers().filter(c => c.id !== id));
  showToast('Customer deleted', 'info');
  renderCustomers();
}

function renderCustomers(){
  const q = (document.getElementById('search').value || '').toLowerCase();
  const all = getCustomers();
  const filtered = all.filter(c =>
    (c.name||'').toLowerCase().includes(q) ||
    (c.company||'').toLowerCase().includes(q) ||
    (c.email||'').toLowerCase().includes(q)
  );

  document.getElementById('custCountLabel').textContent = `${all.length} customer${all.length!==1?'s':''}`;

  const tbody = document.getElementById('customerTable');
  const empty = document.getElementById('emptyState');

  if(filtered.length === 0){
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(c => {
    const initials = c.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const color    = getColor(c.name);
    return `<tr class="customer-row">
      <td><div class="avatar-cell" style="background:${color}">${initials}</div></td>
      <td><strong>${c.name}</strong></td>
      <td>${c.company||'—'}</td>
      <td style="color:var(--muted);font-size:13px">${c.email||'—'}</td>
      <td style="color:var(--muted);font-size:13px">${c.phone||'—'}</td>
      <td>
        <div class="action-btns">
          <button class="btn btn-outline btn-sm" onclick="editCustomer(${c.id})">✏️ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${c.id})">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

renderCustomers();
</script>
</body>
</html>
